apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pipeline-pr-main
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "https://github.com/tektoncd/catalog/raw/main/task/git-clone/0.10/git-clone.yaml"
spec:
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    workspaces:
      - name: source
    tasks:
      - name: fetch-repository
        taskRef:
          name: git-clone
        workspaces:
          - name: output
            workspace: source
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)
      - name: go-lint
        runAfter:
          - fetch-repository
        taskRef:
          params:
            - name: kind
              value: task
            - name: name
              value: go-lint
            - name: namespace
              value: openshift-pipelines
          resolver: cluster
        workspaces:
          - name: source
            workspace: source
      - name: github-sarif
        params:
          - name: commit-sha
            value: $(params.revision)
          - name: github-token-secret-name
            value: "{{ git_auth_secret }}"
          - name: pull-request-number
            value: "{{ pull_request_number }}"
          - name: repo
            value: "{{ repo_owner }}/{{ repo_name }}"
          - name: sarif-file
            value: $(tasks.go-lint.results.sarif-file-name)
        runAfter:
          - go-lint
        taskRef:
          params:
            - name: kind
              value: task
            - name: name
              value: upload-github-sarif
            - name: namespace
              value: openshift-pipelines
          resolver: cluster
        workspaces:
          - name: source
            workspace: source
      - name: build
        runAfter:
          - fetch-repository
        workspaces:
          - name: source
            workspace: source
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: build
              image: registry.access.redhat.com/ubi10/go-toolset:10.1-1777043914@sha256:64b0eccf291e6e060009846eb1131babf4bc653fb77fc7b53ff3550b5cc611f2
              workingDir: $(workspaces.source.path)
              script: |
                git config --global --add safe.directory $(pwd) 
                make VERSION=$(params.revision) && ./bin/rpmostree_exporter_linux_amd64 --version && make gotest && make clean

  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
